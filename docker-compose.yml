services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: grid-telemetry-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql+asyncpg://grid:telemetry@postgres:5432/grid_telemetry
      FASTF1_CACHE_DIR: /app/cache
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000","http://0.0.0.0:3000"]'
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./cache:/app/cache
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - grid-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: grid-telemetry-frontend
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NUXT_PUBLIC_WS_BASE_URL: ws://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - grid-network

  redis:
    image: redis:7-alpine
    container_name: grid-telemetry-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - grid-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: grid-telemetry-postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: grid
      POSTGRES_PASSWORD: telemetry
      POSTGRES_DB: grid_telemetry
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - grid-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grid -d grid_telemetry"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
  pg_data:

networks:
  grid-network:
    driver: bridge
